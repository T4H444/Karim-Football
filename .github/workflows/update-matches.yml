name: Update Today's Matches

on:
  schedule:
    # GitHub Actions minimum is ~every hour on free plans.
    # Running at :00 and :30 of every hour = effectively every 30 min.
    - cron: '0 * * * *'   # on the hour
    - cron: '30 * * * *'  # on the half-hour
  workflow_dispatch:       # keep manual trigger

permissions:
  contents: write

jobs:
  fetch-matches:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        # livesoccertv-parser removed — we scrape directly now
        run: npm install node-fetch@2

      - name: Fetch today's matches
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: node scripts/fetch-matches.js

      - name: Commit and push matches.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/matches.json
          git diff --staged --quiet || git commit -m "chore: update matches [auto $(date -u +%H:%M)]"
          git push
